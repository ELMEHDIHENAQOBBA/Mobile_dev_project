# =============================================
# Application
# =============================================
spring.application.name=tourist-guide-backend
server.port=8085

# =============================================
# PostgreSQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/tourist_guide_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mehdi1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
app.jwt.secret=tourist_guide_super_secret_key_change_in_production_must_be_256bits
app.jwt.expiration-ms=86400000

# =============================================
# Logging
# =============================================
logging.level.com.touristguide=DEBUG
logging.level.org.springframework.security=DEBUG
