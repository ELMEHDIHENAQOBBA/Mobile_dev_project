# =============================================
# Application
# =============================================
spring.application.name=tourist-guide-backend
server.port=8085

# =============================================
# PostgreSQL
# =============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourist_guide_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Jackson
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:tourist_guide_super_secret_key_change_in_production_must_be_256bits}
app.jwt.expiration-ms=86400000

# =============================================
# Logging
# =============================================
logging.level.com.touristguide=DEBUG
logging.level.org.springframework.security=DEBUG
