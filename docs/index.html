<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download GuideMe - Tourist Guide App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #2E86C1;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            background-color: #2E86C1;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #21618C;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🌍</div>
        <h1>GuideMe</h1>
        <p>Your perfect local guide is just a tap away. Download our Android app to start your journey.</p>
        
        <a href="guide-me.apk" class="btn">
            <span>📥</span> Download for Android
        </a>

        <div class="footer">
            Requires Android 5.0+<br>
            Version 1.0.0
        </div>
    </div>
</body>
</html>
